name: Build Android APK

# Builds a signed, installable release APK and uploads it as an artifact on
# every push to main (and on manual dispatch). This is the project's real
# end-to-end build verification.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Assemble release APK
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the build number (git commit count) is accurate.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Stamp build version
        # Regenerates src/buildInfo.js so the in-app Settings version reflects
        # this commit (version + git build number + short SHA).
        run: npm run genversion

      - name: Lint
        run: npm run lint

      - name: Verify the JS bundle builds
        run: npm run bundle:android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        # No RELEASE_* properties are passed, so the release build is signed with
        # the committed, STABLE debug.keystore (see app/build.gradle's release
        # signingConfig fallback). A stable signature means every new build
        # installs as an update over the previous one (no uninstall, data kept).
        # For Play Store distribution, supply your own keystore via repository
        # secrets and pass -PRELEASE_STORE_FILE/-PASSWORD/-KEY_ALIAS/-KEY_PASSWORD.
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Report APK size
        run: ls -lh android/app/build/outputs/apk/release/*.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: csv-budget-tracker-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
